<!DOCTYPE html>
<html>
<head>
    <title>Text Formatting</title>
</head>
<body>

    <h1>Main Heading</h1>

    <h2>Sub Heading</h2>

    <p>This is a normal paragraph.</p>

    <p><b>This text is bold.</b></p>

    <p><i>This text is italic.</i></p>

    <p><u>This text is underlined.</u></p>

    <p>H<sub>2</sub>O</p>

    <p>X<sup>2</sup></p>

</body>
</html>
