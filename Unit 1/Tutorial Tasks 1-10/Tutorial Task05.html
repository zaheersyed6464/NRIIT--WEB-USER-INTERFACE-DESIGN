<!DOCTYPE html>
<html>
<head>
    <title>Lists Example</title>
</head>
<body>

    <h1>Ordered List</h1>

    <ol>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>

    <h1>Unordered List</h1>

    <ul>
        <li>Cricket</li>
        <li>Football</li>
        <li>Kabaddi</li>
    </ul>

    <h1>Nested List</h1>

    <ul>
        <li>Programming Languages
            <ol>
                <li>Python</li>
                <li>Java</li>
                <li>C</li>
            </ol>
        </li>
    </ul>

</body>
</html>
